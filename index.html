<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeng Cards Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,500;1,500;1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0A0A0F;
    --bg-2: #12121c;
    --panel: #15151f;
    --panel-2: #1c1c29;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #e8e8f0;
    --text-dim: #9292a3;
    --gold: #FFD700;
    --gold-dim: #c9a800;
    --accent: #E31937;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Rajdhani', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
  body {
    background:
      radial-gradient(circle at 15% 10%, rgba(255,215,0,0.07) 0%, transparent 35%),
      radial-gradient(circle at 85% 90%, rgba(227,25,55,0.05) 0%, transparent 40%),
      var(--bg);
  }

  header.app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-mark {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    color: #0a0a14;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(255,215,0,0.25);
  }
  .brand h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .brand h1 span { color: var(--gold); }
  .brand p {
    margin: 0;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .badge-mode {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    color: var(--text-dim);
    font-weight: 600;
  }

  main.app {
    display: grid;
    grid-template-columns: minmax(380px, 440px) 1fr;
    gap: 24px;
    padding: 24px 32px 60px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .panel {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .panel h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel h2::before {
    content: '';
    width: 4px;
    height: 14px;
    background: var(--gold);
    border-radius: 2px;
  }

  .form-section + .form-section { margin-top: 22px; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .field input[type="text"],
  .field input[type="number"],
  .field select,
  .field textarea {
    width: 100%;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }
  .field input[type="text"]:focus,
  .field input[type="number"]:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--gold);
    background: rgba(0,0,0,0.5);
  }
  .field textarea { min-height: 80px; resize: vertical; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  input[type="color"] {
    width: 100%;
    height: 42px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    cursor: pointer;
    padding: 4px;
  }

  /* Toggle switch */
  .toggle-field {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
  }
  .toggle-field .toggle-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .toggle-field .toggle-label .title {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 600;
  }
  .toggle-field .toggle-label .desc {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }
  .switch {
    position: relative;
    width: 46px;
    height: 26px;
    flex-shrink: 0;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .switch .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: rgba(255,255,255,0.12);
    border: 1px solid var(--border-strong);
    border-radius: 26px;
    transition: 0.2s;
  }
  .switch .slider::before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    top: 50%;
    transform: translateY(-50%);
    background: #fff;
    border-radius: 50%;
    transition: 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .switch input:checked + .slider {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border-color: var(--gold);
    box-shadow: 0 0 14px rgba(255,215,0,0.45);
  }
  .switch input:checked + .slider::before {
    transform: translate(20px, -50%);
    background: #0a0a14;
  }

  .file-upload {
    position: relative;
    border: 2px dashed var(--border-strong);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(0,0,0,0.2);
  }
  .file-upload:hover {
    border-color: var(--gold);
    background: rgba(255,215,0,0.05);
  }
  .file-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-upload-text {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .file-upload-text strong { color: var(--gold); }
  .file-upload .thumb {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    object-fit: cover;
    margin: 0 auto 8px;
    display: block;
    border: 1px solid var(--border-strong);
  }

  /* Preview panel */
  .preview-panel { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
  .tabs {
    display: flex;
    gap: 6px;
    background: rgba(0,0,0,0.35);
    padding: 6px;
    border-radius: 12px;
    border: 1px solid var(--border);
    width: fit-content;
    margin: 0 auto;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: #0a0a14;
    box-shadow: 0 4px 16px rgba(255,215,0,0.25);
  }

  .preview-frame-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at center, rgba(255,215,0,0.04) 0%, transparent 70%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 12px),
      var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    min-height: 680px;
    position: relative;
  }
  .preview-frame-wrap::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    bottom: 12px;
    border: 1px dashed rgba(255,215,0,0.12);
    border-radius: 10px;
    pointer-events: none;
  }
  #preview-iframe {
    width: 420px;
    height: 620px;
    border: none;
    background: transparent;
    display: block;
  }

  .action-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    border: none;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: #0a0a14;
    box-shadow: 0 6px 24px rgba(255,215,0,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,215,0,0.4); }
  .btn-secondary {
    background: rgba(227,25,55,0.15);
    color: #ff6680;
    border: 1px solid rgba(227,25,55,0.3);
  }
  .btn-secondary:hover { background: rgba(227,25,55,0.25); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border-strong);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--gold); }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,215,0,0.3); }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: #0a0a14;
    padding: 14px 24px;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 13px;
    box-shadow: 0 12px 40px rgba(255,215,0,0.4);
    transition: transform 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 1100px) {
    main.app { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="brand-mark">YC</div>
    <div>
      <h1>Yeng <span>Cards</span></h1>
      <p>Yeng Collectible Card Production Studio</p>
    </div>
  </div>
  <div class="header-actions">
    <span class="badge-mode">Admin Mode</span>
  </div>
</header>

<main class="app">

  <!-- LEFT: FORM PANEL -->
  <aside class="panel form-panel">

    <div class="form-section">
      <h2>Card Subject</h2>

      <div class="field">
        <label>Photo</label>
        <div class="file-upload" id="photoDrop">
          <img class="thumb" id="photoThumb" style="display:none" alt="">
          <div class="file-upload-text">
            <strong>Click to upload</strong> or drag &amp; drop<br>
            <small>JPG, PNG — high res recommended</small>
          </div>
          <input type="file" id="photoInput" accept="image/png,image/jpeg">
        </div>
      </div>

      <div class="field">
        <label>Name</label>
        <input type="text" id="subjectName" placeholder="Yeng Constantino">
      </div>

      <div class="field">
        <label>Card Title</label>
        <input type="text" id="cardTitle" placeholder="Live in Pasay">
      </div>
    </div>

    <div class="form-section">
      <h2>Colors</h2>
      <div class="field-row">
        <div class="field">
          <label>Primary Color</label>
          <input type="color" id="primaryColor" value="#FFD700">
        </div>
        <div class="field">
          <label>Secondary Color</label>
          <input type="color" id="secondaryColor" value="#E31937">
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Card Attributes</h2>
      <div class="field-row">
        <div class="field">
          <label>Rarity</label>
          <select id="rarity">
            <option>Common</option>
            <option>Rare</option>
            <option selected>Epic</option>
            <option>Legendary</option>
          </select>
        </div>
        <div class="field">
          <label>Card # / Total</label>
          <div class="field-row" style="gap:6px;">
            <input type="text" id="cardNumber" placeholder="1">
            <input type="text" id="cardTotal" placeholder="100">
          </div>
        </div>
      </div>
      <div class="field">
        <div class="toggle-field">
          <div class="toggle-label">
            <span class="title">Holographic</span>
            <span class="desc">Adds the animated shimmer overlay</span>
          </div>
          <label class="switch">
            <input type="checkbox" id="holographic" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h2>Card Back</h2>
      <div class="field">
        <label>Biography / Description</label>
        <textarea id="bio" placeholder="Story, highlights, or description for this card..."></textarea>
      </div>
    </div>

    <div class="form-section">
      <h2>Physical Reward Data</h2>
      <div class="field">
        <label>Reward Description</label>
        <textarea id="reward" placeholder="Unlocks the digital card"></textarea>
      </div>
      <div class="field">
        <label>Total Yeng Credits</label>
        <input type="number" id="yengCredits" placeholder="500" min="0">
      </div>
    </div>

  </aside>

  <!-- RIGHT: PREVIEW PANEL -->
  <section class="preview-panel">

    <div class="tabs" role="tablist">
      <button class="tab active" data-type="digital">Digital</button>
      <button class="tab" data-type="physical">Physical</button>
      <button class="tab" data-type="back">Card Back</button>
    </div>

    <div class="preview-frame-wrap">
      <iframe id="preview-iframe" title="Card Preview"></iframe>
    </div>

    <div class="action-bar">
      <button class="btn btn-ghost" id="btnDownloadOne">Download Current</button>
      <button class="btn btn-primary" id="btnDownloadAll">Download All (ZIP)</button>
      <button class="btn btn-secondary" id="btnReset">Reset</button>
    </div>

  </section>
</main>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   YENG CARDS CREATOR — Card Generation Logic
   ============================================================ */

const RARITY_COLORS = {
  'Common':    { color: '#FFFFFF', gradient: 'linear-gradient(45deg, #FFFFFF, #CCCCCC, #FFFFFF)', shadow: 'rgba(255,255,255,0.3)', text: '#0a0a14' },
  'Rare':      { color: '#4ECDC4', gradient: 'linear-gradient(45deg, #4ECDC4, #2EAF9F, #4ECDC4)', shadow: 'rgba(78,205,196,0.4)',   text: '#0a0a14' },
  'Epic':      { color: '#9D4EDD', gradient: 'linear-gradient(45deg, #9D4EDD, #7B2CBF, #9D4EDD, #C77DFF)', shadow: 'rgba(157,78,221,0.4)', text: '#ffffff' },
  'Legendary': { color: '#FFD700', gradient: 'linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #FFEC8B)', shadow: 'rgba(255,215,0,0.5)', text: '#0a0a14' }
};

// Placeholder Gb logo — user will swap with real asset later
const GB_LOGO_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#c9a800"/></linearGradient></defs><rect x="8" y="8" width="104" height="104" rx="18" fill="url(#g)"/><text x="60" y="82" text-anchor="middle" font-family="Oswald, sans-serif" font-size="62" font-weight="700" fill="#0a0a14">Gb</text></svg>';
const GB_LOGO_B64 = 'data:image/svg+xml;base64,' + btoa(GB_LOGO_SVG);

// Decorative starburst SVG for card back (subtle pattern)
const STAR_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="90" fill="none" stroke="#ffffff" stroke-width="2"/><path d="M 100 20 L 108 92 L 180 100 L 108 108 L 100 180 L 92 108 L 20 100 L 92 92 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/></svg>';

// State
const state = {
  photo: '',
  subjectName: 'Yeng Constantino',
  cardTitle: 'Live in Pasay',
  primaryColor: '#FFD700',
  secondaryColor: '#E31937',
  rarity: 'Epic',
  cardNumber: '1',
  cardTotal: '100',
  holographic: true,
  bio: 'A once-in-a-generation voice. This card captures a moment from one of the most iconic live performances of her career.',
  reward: 'Unlocks the digital card',
  yengCredits: 500
};

let currentPreviewType = 'digital';

/* ========== HELPERS ========== */
function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, ch =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function slug(s) {
  return String(s || '').trim().replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-_]/g, '');
}

function generateQRDataURL(text) {
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  return qr.createDataURL(6, 2);
}

function buildRedeemURL(data) {
  const nameSlug = slug(data.subjectName);
  const num = slug(data.cardNumber || '1');
  return 'https://pvlcardgame.netlify.app?redeem=Yeng-' + nameSlug + '-' + num;
}

/* ========== SHARED CARD CSS (front) ========== */
function frontCardCSS(data, opts) {
  const rarity = RARITY_COLORS[data.rarity] || RARITY_COLORS.Epic;
  const primary = data.primaryColor;
  const secondary = data.secondaryColor;
  const isLegendary = data.rarity === 'Legendary';
  const radius = opts.radius || '20px';
  const outerRadius = opts.radius ? (parseInt(opts.radius) + 4) + 'px' : '24px';

  return `
    @page { size: 2.5in 3.5in; margin: 0; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: #0a0a14;
      font-family: 'Rajdhani', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-outer {
      width: 408px;
      height: 608px;
      padding: 4px;
      border-radius: ${outerRadius};
      ${isLegendary
        ? `background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700, #FFEC8B); background-size: 300% 300%; animation: legendaryBorder 4s ease infinite;`
        : `background: ${primary};`}
      box-shadow:
        0 0 24px ${rarity.shadow},
        0 0 60px ${rarity.shadow},
        0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }
    .card {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: ${radius};
      overflow: hidden;
      background-color: #111;
      background-image: ${data.photo ? `url('${data.photo}')` : 'linear-gradient(135deg, #1a1a2e, #16213e)'};
      background-size: cover;
      background-position: center top;
    }
    .holo {
      position: absolute; inset: 0;
      background: linear-gradient(135deg,
        transparent 20%,
        ${primary}22 40%,
        ${secondary}33 50%,
        ${primary}22 60%,
        transparent 80%);
      background-size: 200% 200%;
      animation: holoShift 6s ease-in-out infinite;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 2;
    }
    .top-fade {
      position: absolute; top: 0; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.38) 50%, transparent 100%);
      z-index: 1;
    }
    .bottom-fade {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top,
        rgba(0,0,0,0.95) 0%,
        rgba(0,0,0,0.85) 28%,
        rgba(0,0,0,0.5) 60%,
        transparent 100%);
      z-index: 1;
    }
    .rarity-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 6px 14px;
      border-radius: 20px;
      background: ${rarity.color};
      color: ${rarity.text};
      font-family: 'Oswald', sans-serif;
      font-weight: 700;

/* ========== BUILD PREVIEW ========== */
function buildHtmlFor(type) {
  if (type === 'digital')  return buildDigitalCard(state);
  if (type === 'physical') return buildPhysicalCard(state);
  return buildBackCard(state);
}

function updatePreview() {
  const iframe = document.getElementById('preview-iframe');
  iframe.srcdoc = buildHtmlFor(currentPreviewType);
}

/* ========== FORM BINDING ========== */
function readForm() {
  state.subjectName    = document.getElementById('subjectName').value || state.subjectName;
  state.cardTitle      = document.getElementById('cardTitle').value || state.cardTitle;
  state.primaryColor   = document.getElementById('primaryColor').value;
  state.secondaryColor = document.getElementById('secondaryColor').value;
  state.rarity         = document.getElementById('rarity').value;
  state.cardNumber     = document.getElementById('cardNumber').value || state.cardNumber;
  state.cardTotal      = document.getElementById('cardTotal').value || state.cardTotal;
  state.holographic    = document.getElementById('holographic').checked;
  state.bio            = document.getElementById('bio').value || state.bio;
  state.reward         = document.getElementById('reward').value || state.reward;
  state.yengCredits    = document.getElementById('yengCredits').value || state.yengCredits;
}

function writeFormFromState() {
  document.getElementById('subjectName').value    = state.subjectName;
  document.getElementById('cardTitle').value      = state.cardTitle;
  document.getElementById('primaryColor').value   = state.primaryColor;
  document.getElementById('secondaryColor').value = state.secondaryColor;
  document.getElementById('rarity').value         = state.rarity;
  document.getElementById('cardNumber').value     = state.cardNumber;
  document.getElementById('cardTotal').value      = state.cardTotal;
  document.getElementById('holographic').checked  = state.holographic;
  document.getElementById('bio').value            = state.bio;
  document.getElementById('reward').value         = state.reward;
  document.getElementById('yengCredits').value    = state.yengCredits;
}

function onFormChange() {
  readForm();
  updatePreview();
}

/* ========== PHOTO UPLOAD ========== */
function handlePhotoFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    state.photo = e.target.result;
    const thumb = document.getElementById('photoThumb');
    thumb.src = state.photo;
    thumb.style.display = 'block';
    updatePreview();
  };
  reader.readAsDataURL(file);
}

/* ========== DOWNLOAD ========== */
function downloadFile(filename, content) {
  const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function fileNameBase() {
  return slug(state.subjectName).toLowerCase() || 'card';
}

function downloadCurrent() {
  const type = currentPreviewType;
  const html = buildHtmlFor(type);
  const base = fileNameBase();
  const suffix = type === 'digital' ? '_digital' : type === 'physical' ? '_physical' : '_back';
  downloadFile(base + suffix + '.html', html);
  showToast('Downloaded ' + type + ' card');
}

async function downloadAllZip() {
  if (typeof JSZip === 'undefined') {
    showToast('JSZip not loaded', true);
    return;
  }
  const zip = new JSZip();
  const base = fileNameBase();
  zip.file(base + '_digital.html', buildDigitalCard(state));
  zip.file(base + '_physical.html', buildPhysicalCard(state));
  zip.file(base + '_back.html', buildBackCard(state));

  const meta = {
    subject_name: state.subjectName,
    card_title: state.cardTitle,
    rarity: state.rarity,
    card_number: state.cardNumber,
    card_total: state.cardTotal,
    holographic: state.holographic,
    primary_color: state.primaryColor,
    secondary_color: state.secondaryColor,
    bio: state.bio,
    reward_description: state.reward,
    yeng_credits: state.yengCredits,
    redeem_url: buildRedeemURL(state)
  };
  zip.file(base + '_metadata.json', JSON.stringify(meta, null, 2));

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = base + '_yengcard.zip';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('ZIP downloaded: ' + base);
}

/* ========== TOAST ========== */
let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError
    ? 'linear-gradient(135deg, #E31937, #a01026)'
    : 'linear-gradient(135deg, #FFD700, #c9a800)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ========== INIT ========== */
function init() {
  writeFormFromState();

  const ids = ['subjectName','cardTitle','primaryColor','secondaryColor',
               'rarity','cardNumber','cardTotal','holographic','bio','reward','yengCredits'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', onFormChange);
    el.addEventListener('change', onFormChange);
  });

  const photoInput = document.getElementById('photoInput');
  photoInput.addEventListener('change', e => {
    if (e.target.files && e.target.files[0]) handlePhotoFile(e.target.files[0]);
  });
  const dropZone = document.getElementById('photoDrop');
  ['dragover','dragenter'].forEach(ev => dropZone.addEventListener(ev, e => {
    e.preventDefault(); dropZone.style.borderColor = '#FFD700';
  }));
  ['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => {
    e.preventDefault(); dropZone.style.borderColor = '';
  }));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handlePhotoFile(e.dataTransfer.files[0]);
  });

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPreviewType = btn.dataset.type;
      updatePreview();
    });
  });

  document.getElementById('btnDownloadOne').addEventListener('click', downloadCurrent);
  document.getElementById('btnDownloadAll').addEventListener('click', downloadAllZip);
  document.getElementById('btnReset').addEventListener('click', () => {
    if (confirm('Reset all fields to defaults?')) location.reload();
  });

  updatePreview();
}

document.addEventListener('DOMContentLoaded', init);
</script>
